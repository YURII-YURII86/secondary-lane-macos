interface:
  display_name: "Second Lane Mac Autopilot"
  short_description: "Авторазвёртывание Second Lane на macOS"
  default_prompt: "Открой $gpts-mac-autopilot и проведи меня через установку Second Lane на macOS с минимумом действий: проверь Python 3.13 и ngrok, останавливайся только там, где действительно нужно мои руки (логин, регистрация, вставка authtoken), заполни .env, запусти панель, проверь тоннель, помоги собрать GPT с Actions и сделать первый проверочный запрос. Говори по-русски, пошагово, без технического жаргона."
